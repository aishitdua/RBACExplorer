services:
  - type: web
    name: rbacexplorer-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: "https://your-frontend.onrender.com"
    healthCheckPath: /health
