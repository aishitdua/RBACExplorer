# render.yaml — lives at repo root so Render can discover it
services:
  - type: web
    name: rbacexplorer-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python migrate.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CLERK_JWKS_URL
        value: "https://ruling-caiman-0.clerk.accounts.dev/.well-known/jwks.json"
